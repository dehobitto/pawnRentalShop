services:
  postgres:
    image: postgres:15-alpine
    container_name: rental_shop_db
    environment:
      POSTGRES_DB:       rental_shop
      POSTGRES_USER:     rental_user
      POSTGRES_PASSWORD: rental_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental_user -d rental_shop"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: